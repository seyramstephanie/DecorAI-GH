server:
  port: ${PORT:4000}
  error:
    include-message: always
    include-binding-errors: always
spring:
  application:
    name: decorai-api
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
logging:
  level:
    org.springframework.jdbc.core: warn

# Architecture: modular microservices behind this gateway (see MICROSERVICES.md)
decorai:
  architecture: modular-microservices

# Paste only secrets into root .env — never commit them.
# OPENROUTER_API_KEY=sk-or-v1-...              # required for AI decorate
# GEMINI_IMAGE_MODEL=google/gemini-2.5-flash-image
# GEMINI_VISION_MODEL=google/gemini-2.5-flash
# DATABASE_URL=postgresql://...@ep-xxx-pooler....neon.tech/neondb?sslmode=require
# PAYSTACK_SECRET_KEY=sk_test_...
# MAIL_USERNAME=your@gmail.com
# MAIL_PASSWORD=gmail-app-password
# PRO_PLAN_AMOUNT_PESWAS=5000
